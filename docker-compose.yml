services:
  db:
    image: ghcr.io/evokoa/pggraph:0.1.7
    container_name: polygres-synapse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
